name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Test games service
        run: bun test
        working-directory: services/games

      - name: Test wallets service
        run: bun test
        working-directory: services/wallets

  frontend:
    name: Frontend (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: frontend

      - name: Typecheck
        run: bun run typecheck
        working-directory: frontend

      - name: Test
        run: bun test
        working-directory: frontend
